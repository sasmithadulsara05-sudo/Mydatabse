        // Haversine formula to get distance in meters
        function getDistanceInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371e3; 
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function bufToHex(buffer) { return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join(''); }

        async function processBiometrics() {
            // Setup a doc in Firebase to store the credential ID for fingerprint
            let bioRef = _db.collection('system_auth').doc('user_biometric');
            let bioDoc;
            try { bioDoc = await bioRef.get(); } catch(e) {}
            
            let registeredId = (bioDoc && bioDoc.exists) ? bioDoc.data().credentialId : localStorage.getItem('bio_cred_id');

            if (!registeredId) {
                // First Time -> Register Fingerprint
                if (window.PublicKeyCredential) {
                    try {
                        const cred = await navigator.credentials.create({
                            publicKey: {
                                challenge: new Uint8Array(32),
                                rp: { name: "Secure Stealth Chat", id: window.location.hostname },
                                user: { id: new Uint8Array(16), name: "admin_secure", displayName: "Admin" },
                                pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                                timeout: 60000
                            }
                        });
                        let credId = bufToHex(cred.rawId);
                        localStorage.setItem('bio_cred_id', credId);
                        try { await bioRef.set({ credentialId: credId }); } catch(e) {} // Save to Firebase
                        
                        showToast("Fingerprint Registered!");
                        enterAppSecurely();
                    } catch(e) {
                        customAlert("Fingerprint registration cancelled/failed. You must register to enter.");
                        document.getElementById('lockScreen').style.display = 'flex';
                    }
                } else {
                    // Fallback if browser doesn't support WebAuthn
                    customAlert("Fingerprint not supported here, bypassing securely.");
                    enterAppSecurely();
                }
            } else {
                // Subsequent Times -> Authenticate Fingerprint
                if (window.PublicKeyCredential) {
                    try {
                        // Convert hex string back to Uint8Array for the challenge
                        let idArray = new Uint8Array(registeredId.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                        const assertion = await navigator.credentials.get({
                            publicKey: {
                                challenge: new Uint8Array(32),
                                allowCredentials: [{ type: "public-key", id: idArray, transports: ["internal"] }],
                                userVerification: "required",
                                timeout: 60000
                            }
                        });
                        showToast("Fingerprint Verified!");
                        enterAppSecurely();
                    } catch(e) {
                        customAlert("Fingerprint mismatch or cancelled. Access Denied.");
                        document.getElementById('lockScreen').style.display = 'flex';
                    }
                } else {
                    enterAppSecurely();
                }
            }
        }

        // ==========================================
        //         WEBRTC CALL SYSTEM LOGIC
        // ==========================================
        let callPc = null, callLocalStream = null, callRemoteStream = null;
        let callRecorder = null, callRecordedChunks = [];
        let isCallHost = false, currentCallId = null, callUnsub = null;
        const stunServers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // Generate a unique browser fingerprint ID for remote callers
        function getDeviceFingerprint() {
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            ctx.textBaseline = "top"; ctx.font = "14px 'Arial'"; ctx.fillStyle = "#f60"; ctx.fillRect(125,1,62,20);
            ctx.fillStyle = "#069"; ctx.fillText("StealthChat", 2, 15); ctx.fillStyle = "rgba(102, 204, 0, 0.7)"; ctx.fillText("StealthChat", 4, 17);
            let b64 = canvas.toDataURL().replace("data:image/png;base64,","");
            let bin = atob(b64);
            let crc = 0; for(let i=0; i<bin.length; i++) { crc = (crc << 5) - crc + bin.charCodeAt(i); crc |= 0; }
            return Math.abs(crc).toString(16).toUpperCase() + "-" + navigator.userAgent.length;
        }

        async function initAudioContextForRecording(local, remote) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const dest = ctx.createMediaStreamDestination();
                if(local && local.getAudioTracks().length > 0) ctx.createMediaStreamSource(local).connect(dest);
                if(remote && remote.getAudioTracks().length > 0) ctx.createMediaStreamSource(remote).connect(dest);
                return dest.stream;
            } catch(e) { console.error("Audio mixing failed, fallback to local only", e); return local; }
        }

        // Host creates the call
        async function startCallHost() {
            try { callLocalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); } 
            catch(e) { return customAlert("Please Allow Microphone Access!"); }

            isCallHost = true; callRecordedChunks = [];
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('endCallBtn').style.display = 'block';
            document.getElementById('callStatusText').innerText = "Generating Call Link...";
            document.getElementById('callIpDisplay').innerText = "";
            document.getElementById('callDeviceIdDisplay').innerText = "";
            document.getElementById('callLinkDisplay').style.display = 'block';

            const callsRef = _db.collection('stealth_calls');
            const callDoc = callsRef.doc();
            currentCallId = callDoc.id;

            callPc = new RTCPeerConnection(stunServers);
            callRemoteStream = new MediaStream();
            document.getElementById('remoteAudio').srcObject = callRemoteStream;

            callLocalStream.getTracks().forEach(track => callPc.addTrack(track, callLocalStream));

            callPc.ontrack = async (event) => {
                event.streams[0].getTracks().forEach(track => callRemoteStream.addTrack(track));
                if(callRecorder === null || callRecorder.state === "inactive") {
                    const mixedStream = await initAudioContextForRecording(callLocalStream, callRemoteStream);
                    callRecorder = new MediaRecorder(mixedStream);
                    callRecorder.ondataavailable = e => { if(e.data.size > 0) callRecordedChunks.push(e.data); };
                    callRecorder.onstop = uploadCallRecording;
                    callRecorder.start();
                }
            };

            const offerCandidates = callDoc.collection('offerCandidates');
            callPc.onicecandidate = (event) => { if (event.candidate) offerCandidates.add(event.candidate.toJSON()); };

            const offerDescription = await callPc.createOffer();
            await callPc.setLocalDescription(offerDescription);
            const offer = { sdp: offerDescription.sdp, type: offerDescription.type };
            await callDoc.set({ offer, status: 'waiting' });

            const callUrl = window.location.origin + window.location.pathname + "?call=" + callDoc.id;
            document.getElementById('callLinkDisplay').innerHTML = `Send this link (One-time use):<br><br><a href="${callUrl}" style="color:#0f0;">${callUrl}</a><br><br><button onclick="navigator.clipboard.writeText('${callUrl}'); showToast('Link Copied!')" style="margin-top:15px; padding:8px 15px; background:#EE4488; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">Copy Call Link</button>`;
            document.getElementById('callStatusText').innerText = "Waiting for user to connect...";

            callUnsub = callDoc.onSnapshot((snapshot) => {
                const data = snapshot.data();
                if (!callPc.currentRemoteDescription && data?.answer) { callPc.setRemoteDescription(new RTCSessionDescription(data.answer)); }
                if (data?.ip) { 
                    document.getElementById('callIpDisplay').innerText = "User IP: " + data.ip;
                    document.getElementById('callDeviceIdDisplay').innerText = "Device ID: " + (data.deviceId || "Unknown");
                    document.getElementById('callStatusText').innerText = "Call Connected 🎙️";
                    document.getElementById('callLinkDisplay').style.display = 'none'; 
                }
            });

            callDoc.collection('answerCandidates').onSnapshot((snapshot) => {
                snapshot.docChanges().forEach((change) => { if (change.type === 'added') callPc.addIceCandidate(new RTCIceCandidate(change.doc.data())); });
            });
        }

        // Remote User joins the call
        async function joinCall(callId) {
            document.getElementById('lockScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('callScreen').style.display = 'flex';
            document.getElementById('callStatusText').innerText = "Requesting Microphone...";
            document.getElementById('endCallBtn').style.display = 'none';

            const callDoc = _db.collection('stealth_calls').doc(callId);
            const callData = (await callDoc.get()).data();
            
            if (!callData || callData.status !== 'waiting') {
                document.getElementById('callStatusText').innerText = "Link Expired or Already Used!";
                return;
            }

            try { callLocalStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); } 
            catch(e) { document.getElementById('callStatusText').innerText = "Microphone Access Denied!"; return; }

            document.getElementById('callStatusText').innerText = "Connecting Call...";
            
            let userIp = "Hidden";
            try { let ipRes = await fetch('https://api.ipify.org?format=json'); let ipData = await ipRes.json(); userIp = ipData.ip; } catch(e) {}
            
            let myDeviceId = getDeviceFingerprint(); // Get unique Device Fingerprint for remote user

            callPc = new RTCPeerConnection(stunServers);
            callRemoteStream = new MediaStream();
            document.getElementById('remoteAudio').srcObject = callRemoteStream;

            callLocalStream.getTracks().forEach(track => callPc.addTrack(track, callLocalStream));
            callPc.ontrack = (event) => {
                event.streams[0].getTracks().forEach(track => callRemoteStream.addTrack(track));
                document.getElementById('callStatusText').innerText = "Call Connected 🎙️";
            };

            const answerCandidates = callDoc.collection('answerCandidates');
            callPc.onicecandidate = (event) => { if (event.candidate) answerCandidates.add(event.candidate.toJSON()); };

            await callPc.setRemoteDescription(new RTCSessionDescription(callData.offer));
            const answerDescription = await callPc.createAnswer();
            await callPc.setLocalDescription(answerDescription);

            const answer = { type: answerDescription.type, sdp: answerDescription.sdp };
            
            // Save answer along with IP and Device Fingerprint ID
            await callDoc.update({ answer, status: 'active', ip: userIp, deviceId: myDeviceId });

            callUnsub = callDoc.onSnapshot((snapshot) => {
                const data = snapshot.data();
                if (data?.status === 'ended') {
                    document.getElementById('callStatusText').innerText = "Call Ended by Host.";
                    if(callPc) callPc.close();
                    if(callLocalStream) callLocalStream.getTracks().forEach(t => t.stop());
                }
            });

            callDoc.collection('offerCandidates').onSnapshot((snapshot) => {
                snapshot.docChanges().forEach((change) => { if (change.type === 'added') callPc.addIceCandidate(new RTCIceCandidate(change.doc.data())); });
            });
        }

        async function endCall() {
            if(isCallHost && callRecorder && callRecorder.state !== "inactive") { callRecorder.stop(); }
            if(callPc) callPc.close();
            if(callLocalStream) callLocalStream.getTracks().forEach(t => t.stop());
            
            if(isCallHost && currentCallId) { await _db.collection('stealth_calls').doc(currentCallId).update({ status: 'ended' }); }
            if(callUnsub) callUnsub();
            
            document.getElementById('callScreen').style.display = 'none';
            if(isCallHost) { document.getElementById('mainApp').style.display = 'block'; }
            callRecorder = null;
        }

        async function uploadCallRecording() {
            if(callRecordedChunks.length === 0) return;
            const blob = new Blob(callRecordedChunks, { type: 'audio/webm' });
            const name = "AudioRecord_" + Date.now() + ".webm";
            
            showToast("Sending Voice Record to Group...");
            try {
                await _supabase.storage.from('chat_media').upload(name, blob);
                let url = _supabase.storage.from('chat_media').getPublicUrl(name).data.publicUrl;
                
                let payload = { text: "📞 Call Recording", sender: 'me', media_url: url, group_name: "Normal text" };
                let { data, error } = await _supabase.from('user_data').insert([payload]).select();
                if(data && data[0]) {
                    let backups = JSON.parse(localStorage.getItem('chat_backup') || '[]');
                    backups.push(data[0]); localStorage.setItem('chat_backup', JSON.stringify(backups));
                    if(currentChatGroup === "Normal text") displayMsg(data[0]);
                }
            } catch(e) { console.error("Upload error", e); }
        }

        // Check if URL has a call ID when page loads
        window.addEventListener('DOMContentLoaded', (event) => {
            const urlParams = new URLSearchParams(window.location.search);
            const callId = urlParams.get('call');
            if (callId) {
                joinCall(callId);
            }
        });

    </script>
</body>
</html>
